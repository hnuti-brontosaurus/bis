name: Build, test & deploy

on: [ push ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  pre-commit:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: pre-commit/action@v3.0.1

  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up environment
        run: cp .example.env .env

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          build-args: APP_PORT=8000
          load: true
          tags: bis-backend:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          load: true
          tags: bis-frontend:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Build cookbook image
        uses: docker/build-push-action@v6
        with:
          context: ./cookbook
          load: true
          tags: bis-cookbook:latest
          cache-from: type=gha,scope=cookbook
          cache-to: type=gha,mode=max,scope=cookbook

      - name: Cache frontend node_modules
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: frontend-deps-${{ hashFiles('frontend/yarn.lock') }}

      - name: Cache cookbook node_modules
        uses: actions/cache@v4
        with:
          path: cookbook/node_modules
          key: cookbook-deps-${{ hashFiles('cookbook/yarn.lock') }}

      - name: Run tests
        run: make test

      - name: Build frontend
        run: make build_frontend

      - name: Copy frontend static files to backend
        run: cp -r frontend/build/* backend/frontend_static/

      - name: Build cookbook
        run: make build_cookbook

      - name: Copy cookbook static files to backend
        run: cp -r cookbook/dist/* backend/cookbook_static/

      - name: Build and push final image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          build-args: APP_PORT=8000
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

  claude-fix:
    needs: [pre-commit, build]
    if: failure()
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Skip if last 2 commits are all Claude fixes
        id: guard
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          N=2
          NON_CLAUDE=$(git log -n "$N" --pretty=%s "origin/${BRANCH}" | grep -vc '\[claude-ci-fix\]' || true)
          if [ "$NON_CLAUDE" -eq 0 ]; then
            echo "Last $N commits on ${BRANCH} are all Claude fixes — stopping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Ask Claude to fix CI failure
        if: steps.guard.outputs.skip != 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          additional_permissions: |
            actions: read
          prompt: |
            CI failed on branch `${{ github.ref_name }}`. Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Investigate the failure with `gh run view ${{ github.run_id }} --log-failed`. If you can confidently fix it, push the fix to this branch — include `[claude-ci-fix]` in the commit message. If you're unsure, leave a comment on the open PR (if any) explaining what went wrong instead of pushing a guess.

            Run `pre-commit run --files <changed files>` before committing.
          settings: |
            {
              "permissions": {
                "allow": [
                  "Bash(gh pr comment:*)",
                  "Bash(gh pr diff:*)",
                  "Bash(gh pr view:*)",
                  "Bash(gh pr list:*)",
                  "Bash(gh run view:*)",
                  "Bash(gh run list:*)",
                  "Bash(git diff:*)",
                  "Bash(git log:*)",
                  "Bash(git show:*)",
                  "Bash(git blame:*)",
                  "Bash(git rev-parse:*)",
                  "Bash(git fetch:*)",
                  "Bash(git add:*)",
                  "Bash(git commit:*)",
                  "Bash(git push:*)",
                  "Bash(git checkout:*)",
                  "Bash(git branch:*)",
                  "Bash(git status:*)",
                  "Bash(pre-commit:*)",
                  "Bash(pip install:*)",
                  "Bash(yarn:*)",
                  "Read",
                  "Write",
                  "Edit",
                  "Glob",
                  "Grep"
                ]
              }
            }

  deploy-dev:
    needs: [pre-commit, build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || contains(github.event.head_commit.message, '#deploy')

    steps:
      - name: Deploy new tag
        run: curl -X POST --fail -F token=${{ secrets.GITLAB_TOKEN }} -F "ref=main" -F "variables[TARGET_ENV]=devel" -F "variables[TARGET_TAG]=$GITHUB_SHA" https://gitlab.com/api/v4/projects/43999052/trigger/pipeline

  deploy-prod:
    needs: [pre-commit, build]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Docker login
        run: echo ${{ secrets.GITHUB_TOKEN }} | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

      - name: Pull sha
        run: docker pull ${{ env.IMAGE_NAME }}:$GITHUB_SHA

      - name: Tag sha
        run: docker tag ${{ env.IMAGE_NAME }}:$GITHUB_SHA ${{ env.IMAGE_NAME }}:${GITHUB_REF#refs/*/}

      - name: Push tag
        run: docker push ${{ env.IMAGE_NAME }}:${GITHUB_REF#refs/*/}

      - name: Deploy new tag
        run: curl -X POST --fail -F token=${{ secrets.GITLAB_TOKEN }} -F "ref=main" -F "variables[TARGET_ENV]=production" -F "variables[TARGET_TAG]=${GITHUB_REF#refs/*/}" https://gitlab.com/api/v4/projects/43999052/trigger/pipeline
