name: Build, test & deploy

on: [ push ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  pre-commit:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: pre-commit/action@v3.0.1

  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up environment
        run: |
          touch submodule_sync
          cp .example.env .env
          echo '.git' > .dockerignore
          cat .gitignore >> .dockerignore

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          build-args: APP_PORT=8000
          load: true
          tags: bis-backend:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          load: true
          tags: bis-frontend:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Build cookbook image
        uses: docker/build-push-action@v6
        with:
          context: ./cookbook
          load: true
          tags: bis-cookbook:latest
          cache-from: type=gha,scope=cookbook
          cache-to: type=gha,mode=max,scope=cookbook

      - name: Cache frontend node_modules
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: frontend-deps-${{ hashFiles('frontend/yarn.lock') }}

      - name: Cache cookbook node_modules
        uses: actions/cache@v4
        with:
          path: cookbook/node_modules
          key: cookbook-deps-${{ hashFiles('cookbook/yarn.lock') }}

      - name: Run tests
        run: make test

      - name: Build frontend
        run: make build_frontend

      - name: Copy frontend static files to backend
        run: cp -r frontend/build/* backend/frontend_static/

      - name: Build cookbook
        run: make build_cookbook

      - name: Copy cookbook static files to backend
        run: cp -r cookbook/dist/* backend/cookbook_static/

      - name: Build and push final image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          build-args: APP_PORT=8000
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

  claude-fix:
    needs: [pre-commit, build]
    if: >
      failure() &&
      !contains(github.event.head_commit.message, '[claude-ci-fix]')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Get failed run logs
        id: logs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          {
            echo 'failed_logs<<LOGS_DELIMITER'
            gh run view ${{ github.run_id }} --log-failed 2>&1 | tail -c 50000 || true
            echo 'LOGS_DELIMITER'
          } >> "$GITHUB_OUTPUT"

      - name: Run Claude to fix CI failure
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          direct_prompt: |
            The CI build for branch `${{ github.ref_name }}` failed. Here are the failed logs:

            ```
            ${{ steps.logs.outputs.failed_logs }}
            ```

            Analyze the failure and fix the issue if you're confident you can resolve it.
            If you make changes, commit with `[claude-ci-fix]` in the commit message and push to the current branch.
            Run pre-commit before committing to ensure formatting is correct.
            If you're not sure about the fix, create a GitHub issue describing the problem:
            - Title: a short summary of the CI failure
            - Body: what failed, your analysis of the root cause, and any suggestions for fixing it
            - Use `gh issue create` to create the issue
          settings: |
            {
              "permissions": {
                "allow": [
                  "Bash(git diff:*)",
                  "Bash(git log:*)",
                  "Bash(git show:*)",
                  "Bash(git add:*)",
                  "Bash(git commit:*)",
                  "Bash(git push:*)",
                  "Bash(git status:*)",
                  "Bash(pre-commit:*)",
                  "Bash(pip install:*)",
                  "Bash(yarn:*)",
                  "Bash(make:*)",
                  "Bash(gh issue create:*)",
                  "Read",
                  "Write",
                  "Edit",
                  "Glob",
                  "Grep"
                ]
              }
            }

  deploy-dev:
    needs: [pre-commit, build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || contains(github.event.head_commit.message, '#deploy')

    steps:
      - name: Deploy new tag
        run: curl -X POST --fail -F token=${{ secrets.GITLAB_TOKEN }} -F "ref=main" -F "variables[TARGET_ENV]=devel" -F "variables[TARGET_TAG]=$GITHUB_SHA" https://gitlab.com/api/v4/projects/43999052/trigger/pipeline

  deploy-prod:
    needs: [pre-commit, build]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Docker login
        run: echo ${{ secrets.GITHUB_TOKEN }} | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

      - name: Pull sha
        run: docker pull ${{ env.IMAGE_NAME }}:$GITHUB_SHA

      - name: Tag sha
        run: docker tag ${{ env.IMAGE_NAME }}:$GITHUB_SHA ${{ env.IMAGE_NAME }}:${GITHUB_REF#refs/*/}

      - name: Push tag
        run: docker push ${{ env.IMAGE_NAME }}:${GITHUB_REF#refs/*/}

      - name: Deploy new tag
        run: curl -X POST --fail -F token=${{ secrets.GITLAB_TOKEN }} -F "ref=main" -F "variables[TARGET_ENV]=production" -F "variables[TARGET_TAG]=${GITHUB_REF#refs/*/}" https://gitlab.com/api/v4/projects/43999052/trigger/pipeline
