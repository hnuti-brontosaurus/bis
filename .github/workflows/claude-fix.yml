name: Claude CI Fix

on:
  workflow_run:
    workflows: ["Build, test & deploy"]
    types: [completed]

jobs:
  claude-fix:
    if: github.event.workflow_run.conclusion == 'failure'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_branch }}

      - name: Skip if last 2 commits are all Claude fixes
        id: guard
        run: |
          BRANCH="${{ github.event.workflow_run.head_branch }}"
          N=2
          NON_CLAUDE=$(git log -n "$N" --pretty=%s "origin/${BRANCH}" | grep -vc '\[claude-ci-fix\]' || true)
          if [ "$NON_CLAUDE" -eq 0 ]; then
            echo "Last $N commits on ${BRANCH} are all Claude fixes — stopping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Ask Claude to fix CI failure
        if: steps.guard.outputs.skip != 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          additional_permissions: |
            actions: read
          prompt: |
            CI failed on branch `${{ github.event.workflow_run.head_branch }}` (commit ${{ github.event.workflow_run.head_sha }}). Failed run: https://github.com/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}

            Investigate the failure with `gh run view ${{ github.event.workflow_run.id }} --log-failed`. If you can confidently fix it, push the fix to this branch — include `[claude-ci-fix]` in the commit message. If you're unsure, leave a comment on the open PR (if any) explaining what went wrong instead of pushing a guess.

            Run `pre-commit run --files <changed files>` before committing.
          settings: |
            {
              "permissions": {
                "allow": [
                  "Bash(gh pr comment:*)",
                  "Bash(gh pr diff:*)",
                  "Bash(gh pr view:*)",
                  "Bash(gh pr list:*)",
                  "Bash(gh run view:*)",
                  "Bash(gh run list:*)",
                  "Bash(git diff:*)",
                  "Bash(git log:*)",
                  "Bash(git show:*)",
                  "Bash(git blame:*)",
                  "Bash(git rev-parse:*)",
                  "Bash(git fetch:*)",
                  "Bash(git add:*)",
                  "Bash(git commit:*)",
                  "Bash(git push:*)",
                  "Bash(git checkout:*)",
                  "Bash(git branch:*)",
                  "Bash(git status:*)",
                  "Bash(pre-commit:*)",
                  "Bash(pip install:*)",
                  "Bash(yarn:*)",
                  "Read",
                  "Write",
                  "Edit",
                  "Glob",
                  "Grep"
                ]
              }
            }
