services:
  nginx:
    volumes:
      - ./nginx/dev.conf:/etc/nginx/templates/default.conf.template
      - ./nginx/certs:/etc/nginx/certs

  backend:
    command: ["sh", "docker-entrypoint.sh", "dev"]
    ports:
      - 8000:8000
    profiles:
      - backend
      - dev
    environment:
      DEBUG: 1
      ALLOWED_HOSTS: 'localhost,backend,frontend,192.168.2.3'

  frontend:
    restart: always
    command: ["sh", "docker-entrypoint.sh", "dev"]
    ports:
      - 3000:3000
    profiles:
      - frontend
      - dev
    environment:
      HOST: 0.0.0.0
      DEBUG: 1
      NODE_ENV: 'development'

  cookbook:
    restart: always
    command: ["sh", "docker-entrypoint.sh", "dev"]
    ports:
      - 3001:3001
    profiles:
      - frontend
      - dev
    environment:
      HOST: 0.0.0.0
