repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.3.0
    hooks:
      - id: check-yaml
      - id: end-of-file-fixer
        exclude: \.svg$
      - id: trailing-whitespace
      - id: detect-private-key
      - id: check-toml
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.8
    hooks:
      - id: ruff
        args:
          [
            --fix,
            --select,
            "E,F,W,I,UP,DJ,B,PERF,FURB,PIE,C4",
            --extend-ignore,
            "E501,B007,B011,B905,B904,FURB171,C408",
            --target-version,
            "py312",
          ]
      - id: ruff-format
  - repo: local
    hooks:
      - id: generate-translations
        name: generate frontend translations
        entry: python backend/translation/generate_translations.py
        language: python
        additional_dependencies: [pyyaml==6.0.2]
        files: ^backend/translation/(model|string)_translations\.yaml$
        pass_filenames: false
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v2.7.1
    hooks:
      - id: prettier
        files: ^frontend/.*\.(ts|tsx|js|jsx|json|md|css|scss)$
        args: ["--config", "frontend/.prettierrc.yml"]
  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v8.56.0
    hooks:
      - id: eslint
        files: ^frontend/.*\.(ts|tsx|js|jsx)$
        types: [file]
        args:
          [
            "--config",
            "frontend/.eslintrc.yml",
            "--ignore-path",
            "frontend/.eslintignore",
            "--fix",
          ]
        additional_dependencies:
          - eslint@8.56.0
          - "@typescript-eslint/eslint-plugin@5.62.0"
          - "@typescript-eslint/parser@5.62.0"
          - eslint-plugin-react@7.33.0
          - eslint-plugin-react-hooks@4.6.0
          - eslint-plugin-prettier@4.2.1
          - eslint-plugin-import@2.27.5
          - eslint-config-prettier@8.5.0
          - prettier@2.7.1
