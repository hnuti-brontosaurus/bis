repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.3.0
    hooks:
      - id: check-yaml
        # docker-compose.test.yaml uses the !override tag pyyaml does not know
        exclude: ^docker-compose\.test\.yaml$
      - id: end-of-file-fixer
        exclude: \.svg$
      - id: trailing-whitespace
      - id: detect-private-key
      - id: check-toml
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.8
    hooks:
      - id: ruff
        args:
          [
            --fix,
            --select,
            "E,F,W,I,UP,DJ,B,PERF,FURB,PIE,C4,SIM,RUF,A",
            --extend-ignore,
            "E501,B007,B011,B905,B904,FURB171,C408,SIM102,RUF001,RUF012",
            --target-version,
            "py312",
          ]
      - id: ruff-format
  - repo: local
    hooks:
      - id: generate-translations
        name: generate frontend translations
        entry: python backend/translation/generate_translations.py
        language: python
        additional_dependencies: [pyyaml==6.0.2]
        files: ^backend/translation/(model|string)_translations\.yaml$
        pass_filenames: false
  - repo: https://github.com/rbubley/mirrors-prettier
    rev: v3.8.3
    hooks:
      - id: prettier
        files: ^(frontend|cookbook)/.*\.(vue|ts|tsx|js|jsx|json|md|css|scss)$
  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v8.56.0
    hooks:
      - id: eslint
        alias: frontend-eslint
        name: eslint (frontend)
        files: ^frontend/.*\.(ts|tsx|js|jsx)$
        types: [file]
        args:
          [
            "--config",
            "frontend/.eslintrc.yml",
            "--ignore-path",
            "frontend/.eslintignore",
            "--fix",
          ]
        additional_dependencies:
          - eslint@8.56.0
          - "@typescript-eslint/eslint-plugin@5.62.0"
          - "@typescript-eslint/parser@5.62.0"
          - eslint-plugin-react@7.33.0
          - eslint-plugin-react-hooks@4.6.0
          - eslint-plugin-import@2.27.5
          - eslint-config-prettier@8.5.0
  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v9.9.1
    hooks:
      - id: eslint
        alias: cookbook-eslint
        name: eslint (cookbook)
        # Pre-commit installs additional_dependencies into its own node_env
        # and exposes them via NODE_PATH. NODE_PATH is honored by CommonJS
        # require() but NOT by ESM `import`, so the config file must be
        # `.cjs` and use require() — otherwise resolution from
        # cookbook/eslint.config.js fails with ERR_MODULE_NOT_FOUND.
        language_version: "22.11.0"
        files: ^cookbook/.*\.(vue|js|jsx|cjs|mjs)$
        types: [file]
        args: ["--config", "cookbook/eslint.config.cjs", "--fix"]
        additional_dependencies:
          - eslint@9.39.2
          - eslint-plugin-vue@10.6.2
          - vue-eslint-parser@10.4.0
          - "@vue/eslint-config-prettier@10.2.0"
          - eslint-config-prettier@10.1.8
          - eslint-plugin-unused-imports@4.4.1
          - globals@14.0.0
          - "@eslint/js@9.39.2"
