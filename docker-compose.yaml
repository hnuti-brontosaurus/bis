services:
  nginx:
    container_name: bis-nginx
    image: nginx:1.28-alpine
    ports:
      - ${APP_PORT}:80
    extra_hosts:
      - host.docker.internal:host-gateway
    volumes:
      - ./nginx/dev.conf:/etc/nginx/templates/default.conf.template
      - ./logs:/app/logs
      - ./frontend/build:/app/frontend
      - ./backend/backend_static:/app/backend_static
      - ./backend/media:/app/media

  frontend:
    container_name: bis-frontend
    build: ./frontend
    user: "${UID:-1000}:${GID:-1000}"
    restart: always
    command: ["sh", "docker-entrypoint.sh", "dev"]
    ports:
      - 3000:3000
    volumes:
      - ./logs:/logs
      - ./frontend:/app
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3000/"]
      interval: 1s
      retries: 600
    environment:
      HOME: /tmp
      HOST: 0.0.0.0
      APP_NAME: 'bis'
      API_BASE: 'api/'
      NODE_ENV: 'development'
      VITE_ENVIRONMENT: local
      VITE_SENTRY_DSN: https://f3a6554a5b71437682e51b0410e20c64@o4504321204027392.ingest.sentry.io/4504453023924224
      VITE_MAPY_CZ_API_KEY: chqysuJbnz1zVPuiyvVCuP_kSaCHVVVzUDPwtrDcn30

  cookbook:
    container_name: bis-cookbook
    build: ./cookbook
    user: "${UID:-1000}:${GID:-1000}"
    restart: always
    command: ["sh", "docker-entrypoint.sh", "dev"]
    ports:
      - 3001:3001
    volumes:
      - ./logs:/logs
      - ./cookbook:/app
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:3001/cookbook/"]
      interval: 1s
      retries: 600
    environment:
      HOME: /tmp
      HOST: 0.0.0.0

  backend:
    container_name: bis-backend
    build:
      context: ./backend
      args:
        APP_PORT: 8000
    user: "${UID:-1000}:${GID:-1000}"
    restart: always
    command: ["sh", "docker-entrypoint.sh", "dev"]
    ports:
      - 8000:8000
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import urllib.request; urllib.request.urlopen('http://$$APP_HOST:$$APP_PORT/api/').read()"
      interval: 1s
      retries: 600
    volumes:
      - ./logs:/logs
      - ./backend:/app
      - ./event_images:/event_images
    environment:
      SECRET_KEY: ${SECRET_KEY}
      SENTRY_DSN: https://00f28fbc60bd42468f7ca9818037daa5@o4504321204027392.ingest.sentry.io/4504452985192449
      APP_HOST: backend
      APP_PORT: 8000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      EMAIL: 'bis@brontosaurus.cz'
      FULL_HOSTNAME: ${FULL_HOSTNAME}
      ENVIRONMENT: local
      ALLOWED_HOSTS: 'localhost,backend,frontend,192.168.2.3'
      APP_NAME: 'bis'
      API_BASE: 'api/'
      ECOMAIL_API_KEY: ${ECOMAIL_API_KEY}
      DARUJME_API_KEY: ${DARUJME_API_KEY}
      DARUJME_SECRET: ${DARUJME_SECRET}
      PROD_API_TOKEN: ${PROD_API_TOKEN}
      HCAPTCHA_SECRET: ${HCAPTCHA_SECRET}
      GROQ_API_KEY: ${GROQ_API_KEY}
      GOOGLE_CREDENTIALS: ${GOOGLE_CREDENTIALS}

  postgres:
    container_name: bis-postgres
    image: postgis/postgis:17-3.6-alpine
    volumes:
      - postgresqldata:/var/lib/postgresql/data
    ports:
      - 127.0.0.1:5432:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 1s
      retries: 600
    environment:
      POSTGRES_DATABASE: ${DB_NAME} # for postgres
      POSTGRES_DB: ${DB_NAME} # for postgis
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_ROOT_PASSWORD: ${DB_PASSWORD}

volumes:
  postgresqldata:
