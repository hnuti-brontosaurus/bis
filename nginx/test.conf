
# Test stack — service-to-service hostnames so this can run alongside `make dev`.
#
# Uses an embedded resolver + variable proxy_pass so a missing upstream
# (e.g. cypress runs cookbook tests without the frontend service) won't
# prevent nginx from starting.
resolver 127.0.0.11 valid=30s ipv6=off;

server {
    listen 80 default;
    server_name localhost;
    error_log  /app/logs/error.log;
    access_log /app/logs/access.log;

    client_max_body_size 100M;

    proxy_read_timeout 1800;
    proxy_connect_timeout 1800;
    proxy_send_timeout 1800;

    location / {
        set $upstream_frontend frontend;
        proxy_pass http://$upstream_frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    location /cookbook/ {
        set $upstream_cookbook cookbook;
        proxy_pass http://$upstream_cookbook:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    location /api/ {
        set $upstream_backend backend;
        proxy_pass http://$upstream_backend:8000;
        proxy_set_header Host $host;
    }

    location /admin/ {
        set $upstream_backend backend;
        proxy_pass http://$upstream_backend:8000;
        proxy_set_header Host $host;
    }

    location /backend_static/ {
        set $upstream_backend backend;
        proxy_pass http://$upstream_backend:8000;
        proxy_set_header Host $host;
    }

    location /media/ {
        set $upstream_backend backend;
        proxy_pass http://$upstream_backend:8000;
        proxy_set_header Host $host;
    }
}
